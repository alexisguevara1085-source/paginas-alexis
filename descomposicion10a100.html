<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Descomposición Decenas y Unidades</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:20px;
width:900px;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
display:flex;
gap:30px;
}

.main{
flex:1;
text-align:center;
}

h1{
margin-top:0;
}

.numero{
font-size:80px;
color:#ff6b6b;
font-weight:bold;
}

input{
width:120px;
font-size:30px;
text-align:center;
padding:10px;
margin:10px;
border-radius:10px;
border:2px solid #ccc;
}

button{
padding:10px 20px;
font-size:20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#3e8e41;
}

.teclado{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
}

.tecla{
background:#f1f1f1;
padding:18px;
font-size:22px;
border-radius:10px;
cursor:pointer;
box-shadow:0px 3px 6px rgba(0,0,0,0.2);
}

.tecla:hover{
background:#ddd;
}

.resultado{
font-size:24px;
margin-top:15px;
font-weight:bold;
}

/* BLOQUES BASE 10 */

.bloques{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
margin:15px 0;
min-height:40px;
}

.decena{
width:12px;
height:60px;
background:#3498db;
border-radius:3px;
}

.unidad{
width:18px;
height:18px;
background:#f1c40f;
border-radius:4px;
}

</style>
</head>

<body>

<div class="container">

<div class="main">

<h1>Descompón el número</h1>

<div class="numero" id="numero"></div>

<h3>Representación del número</h3>
<div class="bloques" id="bloquesNumero"></div>

<hr>

<div>

<input id="decenas" placeholder="Decenas">
<span style="font-size:30px"> + </span>
<input id="unidades" placeholder="Unidades">

</div>

<h3>Tu representación</h3>
<div class="bloques" id="bloquesEstudiante"></div>

<button onclick="verificar()">Verificar</button>

<div class="resultado" id="resultado"></div>

</div>

<div class="teclado">

<div class="tecla" onclick="agregar(1)">1</div>
<div class="tecla" onclick="agregar(2)">2</div>
<div class="tecla" onclick="agregar(3)">3</div>

<div class="tecla" onclick="agregar(4)">4</div>
<div class="tecla" onclick="agregar(5)">5</div>
<div class="tecla" onclick="agregar(6)">6</div>

<div class="tecla" onclick="agregar(7)">7</div>
<div class="tecla" onclick="agregar(8)">8</div>
<div class="tecla" onclick="agregar(9)">9</div>

<div class="tecla" onclick="borrar()">⌫</div>
<div class="tecla" onclick="agregar(0)">0</div>

</div>

</div>

<script>

let numero;
let campoActivo=null;

const decenasInput=document.getElementById("decenas");
const unidadesInput=document.getElementById("unidades");

decenasInput.onclick=()=>campoActivo=decenasInput;
unidadesInput.onclick=()=>campoActivo=unidadesInput;

function nuevoNumero(){

numero=Math.floor(Math.random()*90)+10;

document.getElementById("numero").textContent=numero;

decenasInput.value="";
unidadesInput.value="";
document.getElementById("resultado").textContent="";

dibujarNumero();
dibujarEstudiante();

}

function agregar(n){

if(!campoActivo) return;

campoActivo.value+=n;

dibujarEstudiante();

}

function borrar(){

if(!campoActivo) return;

campoActivo.value=campoActivo.value.slice(0,-1);

dibujarEstudiante();

}

function dibujarNumero(){

let cont=document.getElementById("bloquesNumero");

cont.innerHTML="";

let d=Math.floor(numero/10);
let u=numero%10;

for(let i=0;i<d;i++){

let barra=document.createElement("div");
barra.className="decena";
cont.appendChild(barra);

}

for(let i=0;i<u;i++){

let cuad=document.createElement("div");
cuad.className="unidad";
cont.appendChild(cuad);

}

}

function dibujarEstudiante(){

let cont=document.getElementById("bloquesEstudiante");

cont.innerHTML="";

let d=parseInt(decenasInput.value)||0;
let u=parseInt(unidadesInput.value)||0;

let barras=d/10;

for(let i=0;i<barras;i++){

let barra=document.createElement("div");
barra.className="decena";
cont.appendChild(barra);

}

for(let i=0;i<u;i++){

let cuad=document.createElement("div");
cuad.className="unidad";
cont.appendChild(cuad);

}

}

function verificar(){

let d=parseInt(decenasInput.value);
let u=parseInt(unidadesInput.value);

let decenaCorrecta=Math.floor(numero/10)*10;
let unidadCorrecta=numero%10;

if(d===decenaCorrecta && u===unidadCorrecta){

document.getElementById("resultado").style.color="green";
document.getElementById("resultado").textContent="✔ Correcto";

setTimeout(nuevoNumero,1200);

}else{

document.getElementById("resultado").style.color="red";
document.getElementById("resultado").textContent="✘ Revisa las barras";

}

}

nuevoNumero();

</script>

</body>
</html>
