<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Completar hasta 100</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#36d1dc,#5b86e5);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:20px;
border-radius:20px;
width:1100px;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.menu button{
padding:10px;
border-radius:10px;
cursor:pointer;
}

.seccion{display:none;}
.activo{display:block;}

/* CUADROS */
.fila{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:10px;
}

.caja100{
width:150px;
height:150px;
display:grid;
grid-template-columns:repeat(10,1fr);
grid-template-rows:repeat(10,1fr);
gap:1px;
border:2px solid black;
}

.celda{background:#eee;}
.azul{background:#3498db;}
.verde{background:#2ecc71;}

input{
width:90px;
font-size:25px;
text-align:center;
}

.resultado{
text-align:center;
margin-top:10px;
font-weight:bold;
}

/* RECTA */

.recta{
display:flex;
justify-content:space-between;
margin:20px;
}

.azulTexto{color:#3498db;font-weight:bold;}

.teclado{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
display:grid;
grid-template-columns:repeat(3,60px);
gap:8px;
}

.tecla{
background:#eee;
padding:12px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="menu">
<button onclick="mostrar('s1')">Potencias 10</button>
<button onclick="mostrar('s2')">Recta</button>
<button onclick="mostrar('s3')">General</button>
</div>

<!-- SECCION 1 -->
<div id="s1" class="seccion activo">

<h3 style="text-align:center;">Completa hasta 100 (10 en 10)</h3>

<div class="fila">

<div class="caja100" id="g1"></div>

<div style="font-size:30px;">+</div>

<div class="caja100" id="g1r"></div>

<input id="r1">

<div>= 100</div>

</div>

<div class="resultado" id="res1"></div>

</div>

<!-- SECCION 2 -->
<div id="s2" class="seccion">

<h3 style="text-align:center;">Recta numérica</h3>

<div class="recta" id="recta"></div>

<div style="text-align:center;">

<span id="nBase"></span> + 
<input id="corto"> + 
<input id="largo"> = 100

<br><br>

Debe saltar: <input id="total">

</div>

<div class="resultado" id="res2"></div>

</div>

<!-- SECCION 3 -->
<div id="s3" class="seccion">

<h3 style="text-align:center;">Completa hasta 100</h3>

<div class="fila">

<div class="caja100" id="g3"></div>

<div style="font-size:30px;">+</div>

<div class="caja100" id="g3r"></div>

<input id="r3">

<div>= 100</div>

</div>

<div class="resultado" id="res3"></div>

</div>

</div>

<!-- TECLADO -->
<div class="teclado">

<div class="tecla" onclick="add(1)">1</div>
<div class="tecla" onclick="add(2)">2</div>
<div class="tecla" onclick="add(3)">3</div>
<div class="tecla" onclick="add(4)">4</div>
<div class="tecla" onclick="add(5)">5</div>
<div class="tecla" onclick="add(6)">6</div>
<div class="tecla" onclick="add(7)">7</div>
<div class="tecla" onclick="add(8)">8</div>
<div class="tecla" onclick="add(9)">9</div>
<div class="tecla" onclick="del()">⌫</div>
<div class="tecla" onclick="add(0)">0</div>

</div>

<script>

let activo=null
document.addEventListener("click",e=>{
if(e.target.tagName==="INPUT") activo=e.target
})

function add(n){
if(!activo) return
activo.value+=n
check()
}

function del(){
if(!activo) return
activo.value=activo.value.slice(0,-1)
}

function mostrar(id){
document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activo"))
document.getElementById(id).classList.add("activo")
}

/* DIBUJAR */

function draw(num,id,color){

let cont=document.getElementById(id)
cont.innerHTML=""

for(let i=1;i<=100;i++){

let c=document.createElement("div")
c.className="celda"

if(i<=num) c.classList.add(color)

cont.appendChild(c)

}
}

/* SECCION 1 */
let n1

function gen1(){
n1=(Math.floor(Math.random()*9)+1)*10
draw(n1,"g1","azul")
document.getElementById("r1").value=""
draw(0,"g1r","verde")
}

/* SECCION 3 */
let n3

function gen3(){
n3=Math.floor(Math.random()*100)
draw(n3,"g3","azul")
document.getElementById("r3").value=""
draw(0,"g3r","verde")
}

/* SECCION 2 */
let n2, sup

function gen2(){

n2=Math.floor(Math.random()*90)+1
let inf=Math.floor(n2/10)*10
sup=inf+10

document.getElementById("recta").innerHTML=
`0 --- <span class="azulTexto">${inf}</span> --- <span class="azulTexto">${sup}</span> --- 100 <br> ↑ ${n2}`

document.getElementById("nBase").textContent=n2

}

/* VALIDAR */

function check(){

let r=parseInt(document.getElementById("r1").value)
if(r==100-n1){
document.getElementById("res1").textContent="✔"
gen1()
}

let r3=parseInt(document.getElementById("r3").value)
if(r3==100-n3){
document.getElementById("res3").textContent="✔"
gen3()
}

let a=parseInt(document.getElementById("corto").value)
let b=parseInt(document.getElementById("largo").value)
let t=parseInt(document.getElementById("total").value)

if(a==(sup-n2) && b==(100-sup) && t==(100-n2)){
document.getElementById("res2").textContent="✔"
gen2()
}

}

gen1()
gen2()
gen3()

</script>

</body>
</html>
