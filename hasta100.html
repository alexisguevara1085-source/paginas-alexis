<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Completar hasta 100</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#36d1dc,#5b86e5);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:20px;
border-radius:20px;
width:1100px;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.menu button{
padding:10px;
border-radius:10px;
cursor:pointer;
}

.seccion{display:none;}
.activo{display:block;}

.fila{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
}

.numeroGrande{
font-size:40px;
font-weight:bold;
text-align:center;
}

/* CUADRO 100 */

.caja100{
width:150px;
height:150px;
display:grid;
grid-template-columns:repeat(10,1fr);
grid-template-rows:repeat(10,1fr);
gap:1px;
border:2px solid black;
}

.celda{background:#eee;}
.azul{background:#3498db;}
.verde{background:#2ecc71;}

input{
width:90px;
font-size:25px;
text-align:center;
}

/* RECTA NUMERICA */

.rectaContainer{
text-align:center;
margin-top:20px;
}

svg{
width:900px;
height:120px;
}

line{
stroke:black;
stroke-width:3;
}

.arc1{
stroke:red;
stroke-width:4;
fill:none;
}

.arc2{
stroke:blue;
stroke-width:4;
fill:none;
}

.resultado{
text-align:center;
font-weight:bold;
margin-top:10px;
}

/* TECLADO */

.teclado{
display:grid;
grid-template-columns:repeat(3,60px);
gap:8px;
margin-left:20px;
}

.tecla{
background:#eee;
padding:12px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="menu">
<button onclick="mostrar('s1')">Potencias 10</button>
<button onclick="mostrar('s2')">Recta</button>
<button onclick="mostrar('s3')">General</button>
</div>

<!-- SECCION 1 -->

<div id="s1" class="seccion activo">

<div class="numeroGrande" id="num1"></div>

<div class="fila">

<div class="caja100" id="g1"></div>

<div style="font-size:30px;">+</div>

<div class="caja100" id="g1r"></div>

<input id="r1">

<div>=100</div>

<div class="teclado" id="tec1"></div>

</div>

<div class="resultado" id="res1"></div>

</div>

<!-- SECCION 2 -->

<div id="s2" class="seccion">

<div class="rectaContainer">

<svg id="recta"></svg>

</div>

<div style="text-align:center;margin-top:10px;">

<span id="base"></span> +

<input id="salto1">

+

<input id="salto2">

= 100

<br><br>

Debe saltar

<input id="total">

</div>

<div style="text-align:center;margin-top:10px;">
<button onclick="comprobarRecta()">Comprobar</button>
</div>

<div class="resultado" id="res2"></div>

</div>

<!-- SECCION 3 -->

<div id="s3" class="seccion">

<div class="numeroGrande" id="num3"></div>

<div class="fila">

<div class="caja100" id="g3"></div>

<div style="font-size:30px;">+</div>

<div class="caja100" id="g3r"></div>

<input id="r3">

<div>=100</div>

<div class="teclado" id="tec3"></div>

</div>

<div class="resultado" id="res3"></div>

</div>

</div>

<script>

/* MENU */

function mostrar(id){

document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activo"))
document.getElementById(id).classList.add("activo")

}

/* DIBUJAR CUADRO */

function draw(base,extra,id){

let cont=document.getElementById(id)
cont.innerHTML=""

for(let i=1;i<=100;i++){

let c=document.createElement("div")
c.className="celda"

if(i<=base) c.classList.add("azul")
else if(i<=base+extra) c.classList.add("verde")

cont.appendChild(c)

}

}

/* SECCION 1 */

let n1

function gen1(){

n1=(Math.floor(Math.random()*9)+1)*10

document.getElementById("num1").textContent=n1

draw(n1,0,"g1")
draw(n1,0,"g1r")

document.getElementById("r1").value=""

}

document.getElementById("r1").addEventListener("input",()=>{

let v=parseInt(r1.value)||0

draw(n1,v,"g1r")

if(v==100-n1){

document.getElementById("res1").textContent="✔ Correcto"

setTimeout(gen1,1200)

}

})

/* SECCION 3 */

let n3

function gen3(){

n3=Math.floor(Math.random()*100)

document.getElementById("num3").textContent=n3

draw(n3,0,"g3")
draw(n3,0,"g3r")

}

document.getElementById("r3").addEventListener("input",()=>{

let v=parseInt(r3.value)||0

draw(n3,v,"g3r")

if(v==100-n3){

document.getElementById("res3").textContent="✔ Correcto"

setTimeout(gen3,1200)

}

})

/* RECTA */

let num, sup

function genRecta(){

num=Math.floor(Math.random()*90)+1

let inf=Math.floor(num/10)*10
sup=inf+10

document.getElementById("base").textContent=num

let svg=document.getElementById("recta")

svg.innerHTML=`

<line x1="50" y1="80" x2="850" y2="80"/>

<text x="50" y="100">0</text>

<text x="300" y="100" fill="blue">${inf}</text>

<text x="400" y="100" fill="blue">${sup}</text>

<text x="850" y="100">100</text>

<circle cx="350" cy="80" r="6"/>

<text x="340" y="60">${num}</text>

<path class="arc1" d="M350 60 Q380 20 400 60"/>

<path class="arc2" d="M400 60 Q650 -20 850 60"/>

`

}

function comprobarRecta(){

let a=parseInt(salto1.value)
let b=parseInt(salto2.value)
let t=parseInt(total.value)

if(a==(sup-num) && b==(100-sup) && t==(100-num)){

document.getElementById("res2").textContent="✔ Correcto"

setTimeout(genRecta,1200)

}else{

document.getElementById("res2").textContent="❌ Incorrecto"

}

}

gen1()
gen3()
genRecta()

</script>

</body>
</html>
