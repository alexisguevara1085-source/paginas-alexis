<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Arcade: Nubes de Números</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        :root {
            --sky-top: #a1c4fd;
            --sky-bottom: #c2e9fb;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            touch-action: none; /* Evitar scroll nativo y zoom en móviles */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Nubes animadas por CSS */
        .clouds-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            filter: blur(2px);
            animation: float-clouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
        }
        .cloud::before {
            width: 60px; height: 60px; top: -30px; left: 20px;
        }
        .cloud::after {
            width: 40px; height: 40px; top: -15px; left: 70px;
        }

        @keyframes float-clouds {
            from { transform: translateX(110vw); }
            to { transform: translateX(-30vw); }
        }

        .cloud1 { top: 10%; width: 120px; height: 40px; animation-duration: 40s; }
        .cloud2 { top: 30%; width: 150px; height: 50px; animation-duration: 60s; opacity: 0.6; animation-delay: -20s; }
        .cloud3 { top: 60%; width: 100px; height: 35px; animation-duration: 35s; opacity: 0.5; animation-delay: -10s; }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* HUD y UI */
        .ui-layer {
            position: absolute;
            z-index: 20;
            width: 100%;
            pointer-events: none;
        }
        
        .clickable {
            pointer-events: auto;
        }

        .screen-shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Animaciones base de botones */
        .btn-hover {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-hover:active {
            transform: scale(0.95);
        }

        .heart {
            color: #ff4d4f;
            text-shadow: 0 0 5px rgba(255,0,0,0.5);
            transition: transform 0.3s;
        }
        
        .heart.lost {
            color: #cbd5e1;
            text-shadow: none;
            transform: scale(0.8);
        }

        #challenge-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            transition: transform 0.2s;
        }

        .bounce {
            animation: bounce 0.4s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1) translateX(-50%); }
            50% { transform: scale(1.1) translateX(-45%); }
        }
        
        /* Personalizar barra de scroll menú */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Fondo de Nubes -->
    <div class="clouds-container">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
    </div>

    <!-- Menú Principal -->
    <div id="menu-screen" class="ui-layer clickable h-full flex flex-col items-center justify-center bg-white/40 backdrop-blur-md transition-opacity duration-500">
        <div class="glass-panel p-6 md:p-8 rounded-3xl max-w-xl w-[95%] max-h-[95vh] overflow-y-auto custom-scrollbar text-center flex flex-col">
            <h1 class="text-4xl md:text-5xl font-bold text-blue-600 mb-2 drop-shadow-sm">Math Arcade</h1>
            <p class="text-gray-600 mb-6 font-medium">Selecciona las operaciones que deseas practicar:</p>
            
            <!-- Grid de Checkboxes -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
                <!-- Sumas -->
                <label class="cursor-pointer relative btn-hover">
                    <input type="checkbox" value="sumas" class="mode-checkbox peer sr-only" checked>
                    <div class="p-3 rounded-2xl font-bold border-4 border-white/70 bg-white/50 shadow-sm peer-checked:border-emerald-400 peer-checked:bg-emerald-100/90 text-gray-500 peer-checked:text-emerald-800 transition-all text-left flex items-center gap-3">
                        <div class="w-6 h-6 rounded border-2 border-gray-400 peer-checked:border-emerald-500 peer-checked:bg-emerald-500 flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="text-base md:text-lg">Sumas (+)</span>
                    </div>
                </label>
                <!-- Restas -->
                <label class="cursor-pointer relative btn-hover">
                    <input type="checkbox" value="restas" class="mode-checkbox peer sr-only" checked>
                    <div class="p-3 rounded-2xl font-bold border-4 border-white/70 bg-white/50 shadow-sm peer-checked:border-rose-400 peer-checked:bg-rose-100/90 text-gray-500 peer-checked:text-rose-800 transition-all text-left flex items-center gap-3">
                        <div class="w-6 h-6 rounded border-2 border-gray-400 peer-checked:border-rose-500 peer-checked:bg-rose-500 flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="text-base md:text-lg">Restas (-)</span>
                    </div>
                </label>
                <!-- Multiplicación -->
                <label class="cursor-pointer relative btn-hover">
                    <input type="checkbox" value="multiplicacion" class="mode-checkbox peer sr-only" checked>
                    <div class="p-3 rounded-2xl font-bold border-4 border-white/70 bg-white/50 shadow-sm peer-checked:border-amber-400 peer-checked:bg-amber-100/90 text-gray-500 peer-checked:text-amber-800 transition-all text-left flex items-center gap-3">
                        <div class="w-6 h-6 rounded border-2 border-gray-400 peer-checked:border-amber-500 peer-checked:bg-amber-500 flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="text-base md:text-lg">Multiplicación (×)</span>
                    </div>
                </label>
                <!-- Dos Cifras -->
                <label class="cursor-pointer relative btn-hover">
                    <input type="checkbox" value="doscifras" class="mode-checkbox peer sr-only" checked>
                    <div class="p-3 rounded-2xl font-bold border-4 border-white/70 bg-white/50 shadow-sm peer-checked:border-blue-400 peer-checked:bg-blue-100/90 text-gray-500 peer-checked:text-blue-800 transition-all text-left flex items-center gap-3">
                        <div class="w-6 h-6 rounded border-2 border-gray-400 peer-checked:border-blue-500 peer-checked:bg-blue-500 flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="text-base md:text-lg">Dos Cifras</span>
                    </div>
                </label>
                <!-- Potencias -->
                <label class="cursor-pointer relative btn-hover">
                    <input type="checkbox" value="cuadrados" class="mode-checkbox peer sr-only">
                    <div class="p-3 rounded-2xl font-bold border-4 border-white/70 bg-white/50 shadow-sm peer-checked:border-purple-400 peer-checked:bg-purple-100/90 text-gray-500 peer-checked:text-purple-800 transition-all text-left flex items-center gap-3">
                        <div class="w-6 h-6 rounded border-2 border-gray-400 peer-checked:border-purple-500 peer-checked:bg-purple-500 flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="text-base md:text-lg">Potencias (x²)</span>
                    </div>
                </label>
                <!-- Descomponer -->
                <label class="cursor-pointer relative btn-hover">
                    <input type="checkbox" value="descomponer" class="mode-checkbox peer sr-only">
                    <div class="p-3 rounded-2xl font-bold border-4 border-white/70 bg-white/50 shadow-sm peer-checked:border-teal-400 peer-checked:bg-teal-100/90 text-gray-500 peer-checked:text-teal-800 transition-all text-left flex items-center gap-3">
                        <div class="w-6 h-6 rounded border-2 border-gray-400 peer-checked:border-teal-500 peer-checked:bg-teal-500 flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="text-base md:text-lg">Descomponer</span>
                    </div>
                </label>
            </div>
            
            <p id="menu-warning" class="text-red-600 font-bold text-sm bg-red-100 rounded-lg py-2 mb-3 hidden">¡Debes seleccionar al menos una operación para jugar!</p>
            
            <button onclick="startSelectedGame()" class="w-full btn-hover bg-gradient-to-b from-blue-400 to-blue-600 text-white py-4 rounded-2xl font-bold text-2xl shadow-lg shadow-blue-300/50 border-b-4 border-blue-700">
                ¡COMENZAR JUEGO!
            </button>
            <p class="text-sm text-gray-500 mt-4 font-medium">Toca la figura gigante con la respuesta correcta. ¡Tienes 2 vidas!</p>
        </div>
    </div>

    <!-- UI del Juego -->
    <div id="game-ui" class="ui-layer h-full hidden flex-col justify-between">
        <!-- Top HUD -->
        <div class="glass-panel mx-4 mt-4 p-3 md:p-4 rounded-2xl flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <div class="text-lg md:text-xl font-bold text-gray-700">Nivel <span id="level-display" class="text-blue-600 text-2xl">1</span></div>
                <div class="text-lg md:text-xl font-bold text-gray-700">Puntos <span id="score-display" class="text-emerald-600 text-2xl">0</span></div>
            </div>
            <div class="flex text-3xl md:text-4xl space-x-1" id="lives-display">
                <span class="heart" id="life-1">❤️</span>
                <span class="heart" id="life-2">❤️</span>
            </div>
        </div>

        <!-- Canvas Principal -->
        <canvas id="gameCanvas"></canvas>

        <!-- Bottom Challenge -->
        <div id="challenge-panel" class="glass-panel px-10 py-4 rounded-3xl text-center mb-6">
            <div class="text-sm md:text-base font-bold text-gray-500 uppercase tracking-widest mb-1">RETO ACTUAL</div>
            <div id="challenge-text" class="text-5xl md:text-6xl font-bold text-gray-900 tracking-tight drop-shadow-sm">--</div>
            <div id="challenge-subtext" class="text-base md:text-lg text-blue-600 font-bold hidden mt-1">Toca el primer número</div>
        </div>
    </div>

    <!-- Pantalla Game Over -->
    <div id="game-over-screen" class="ui-layer clickable h-full hidden flex-col items-center justify-center bg-black/60 backdrop-blur-md transition-opacity duration-500 z-50">
        <div class="glass-panel p-8 rounded-3xl max-w-sm w-[90%] text-center bg-white/95">
            <h2 class="text-5xl font-bold text-red-500 mb-2 drop-shadow-sm">¡Game Over!</h2>
            <p class="text-gray-600 mb-4 text-lg font-medium">Te quedaste sin vidas.</p>
            <div class="text-6xl font-black text-emerald-500 mb-8 drop-shadow-md" id="final-score">0</div>
            <div class="space-y-4">
                <button onclick="restartMode()" class="w-full btn-hover bg-blue-500 text-white py-4 rounded-xl font-bold text-xl border-b-4 border-blue-700">Jugar de Nuevo</button>
                <button onclick="goMenu()" class="w-full btn-hover bg-gray-200 text-gray-700 py-4 rounded-xl font-bold text-xl border-b-4 border-gray-400">Menú Principal</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * LÓGICA DE AUDIO (Sintetizador sin assets externos)
         */
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playTone(freq, type, duration, vol = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playCorrect() {
                this.init();
                this.playTone(600, 'sine', 0.1, 0.1);
                setTimeout(() => this.playTone(800, 'sine', 0.2, 0.1), 100);
            },
            playWrong() {
                this.init();
                this.playTone(200, 'sawtooth', 0.3, 0.15);
                setTimeout(() => this.playTone(150, 'sawtooth', 0.3, 0.15), 100);
            },
            playExtraLife() {
                this.init();
                this.playTone(400, 'sine', 0.1, 0.1);
                setTimeout(() => this.playTone(500, 'sine', 0.1, 0.1), 100);
                setTimeout(() => this.playTone(600, 'sine', 0.1, 0.1), 200);
                setTimeout(() => this.playTone(800, 'sine', 0.4, 0.1), 300);
            },
            playGameOver() {
                this.init();
                this.playTone(300, 'triangle', 0.4, 0.2);
                setTimeout(() => this.playTone(250, 'triangle', 0.4, 0.2), 300);
                setTimeout(() => this.playTone(200, 'triangle', 0.8, 0.2), 600);
            }
        };

        /**
         * LÓGICA DEL JUEGO Y CANVAS
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameLoopId;
        
        const COLORS = ['#A7F3D0', '#FDE68A', '#BFDBFE', '#FBCFE8', '#E9D5FF'];
        const SHAPES = ['circle', 'square', 'triangle', 'star'];

        let gameState = {
            modes: [], // Array de modos seleccionados
            lives: 2,
            score: 0,
            level: 1,
            challengesCompleted: 0,
            active: false,
            currentChallenge: null,
            figures: [],
            particles: [],
            spawnTimer: 0,
            spawnRate: 2000,
            baseSpeed: 1,
            selectedNumber: null
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const MathLogic = {
            sumas() {
                const a = Math.floor(Math.random() * 11);
                const b = Math.floor(Math.random() * 11);
                return { text: `${a} + ${b}`, answer: a + b, type: 'normal' };
            },
            restas() {
                const a = Math.floor(Math.random() * 11);
                const b = Math.floor(Math.random() * (a + 1)); 
                return { text: `${a} - ${b}`, answer: a - b, type: 'normal' };
            },
            multiplicacion() {
                const a = Math.floor(Math.random() * 11);
                const b = Math.floor(Math.random() * 11);
                return { text: `${a} × ${b}`, answer: a * b, type: 'normal' };
            },
            doscifras() {
                const dec = Math.floor(Math.random() * 9) + 1;
                const uni = Math.floor(Math.random() * 10);
                return { text: `${dec}0 + ${uni}`, answer: dec * 10 + uni, type: 'normal' };
            },
            cuadrados() {
                const a = Math.floor(Math.random() * 13);
                return { text: `${a}²`, answer: a * a, type: 'normal' };
            },
            descomponer() {
                const target = Math.floor(Math.random() * 16) + 5;
                return { text: target, answer: target, type: 'decompose' };
            }
        };

        function generateChallenge() {
            // Escoger un modo al azar de la lista de modos activados por el jugador
            const randomMode = gameState.modes[Math.floor(Math.random() * gameState.modes.length)];
            gameState.currentChallenge = MathLogic[randomMode]();
            
            const panelText = document.getElementById('challenge-text');
            const subText = document.getElementById('challenge-subtext');
            
            panelText.innerText = gameState.currentChallenge.text;
            
            const panel = document.getElementById('challenge-panel');
            panel.classList.remove('bounce');
            void panel.offsetWidth; 
            panel.classList.add('bounce');

            if (gameState.currentChallenge.type === 'decompose') {
                gameState.selectedNumber = null;
                subText.classList.remove('hidden');
                subText.innerText = "Toca el primer número";
                subText.className = "text-base md:text-lg text-blue-600 font-bold mt-1";
            } else {
                subText.classList.add('hidden');
            }
        }

        function createFigure(forceCorrect = false, forceLife = false) {
            const width = window.innerWidth;
            // MEJORA 1: Figuras gigantes y altamente visibles (rango 80px a 120px)
            const size = Math.random() * 40 + 80; 
            const x = Math.random() * (width - size * 2) + size;
            let y = -size;
            
            let value, isCorrect = false, isLife = false;

            if (forceLife) {
                isLife = true;
                value = 'VIDA';
            } else if (gameState.currentChallenge.type === 'decompose') {
                const target = gameState.currentChallenge.answer;
                if (forceCorrect) {
                    value = Math.floor(Math.random() * (target - 1)) + 1;
                } else {
                    value = Math.floor(Math.random() * (target + 5));
                }
            } else {
                if (forceCorrect) {
                    value = gameState.currentChallenge.answer;
                    isCorrect = true;
                } else {
                    let target = gameState.currentChallenge.answer;
                    let offset = Math.floor(Math.random() * 10) + 1;
                    value = Math.random() > 0.5 ? target + offset : target - offset;
                    // Prevenir números negativos
                    if (value < 0) value = 0;
                    if (value === target) value += 1;
                }
            }

            gameState.figures.push({
                id: Math.random().toString(36).substr(2, 9),
                x, y,
                size,
                type: isLife ? 'heart' : SHAPES[Math.floor(Math.random() * SHAPES.length)],
                color: isLife ? '#ff4d4f' : COLORS[Math.floor(Math.random() * COLORS.length)],
                speed: gameState.baseSpeed + Math.random() * 0.8 + (gameState.level * 0.2),
                value,
                isCorrect,
                isLife,
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.05
            });
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                gameState.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1,
                    color: color,
                    size: Math.random() * 8 + 3
                });
            }
        }

        function drawShape(ctx, type, x, y, size) {
            ctx.beginPath();
            if (type === 'circle') {
                ctx.arc(x, y, size/2, 0, Math.PI * 2);
            } else if (type === 'square') {
                ctx.roundRect(x - size/2, y - size/2, size, size, 16);
            } else if (type === 'triangle') {
                ctx.moveTo(x, y - size/2);
                ctx.lineTo(x + size/2, y + size/2);
                ctx.lineTo(x - size/2, y + size/2);
                ctx.closePath();
            } else if (type === 'star') {
                const spikes = 5;
                const outerRadius = size / 2;
                const innerRadius = size / 4;
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes;
                    const posX = x + Math.cos(angle - Math.PI/2) * radius;
                    const posY = y + Math.sin(angle - Math.PI/2) * radius;
                    if (i === 0) ctx.moveTo(posX, posY);
                    else ctx.lineTo(posX, posY);
                }
                ctx.closePath();
            } else if (type === 'heart') {
                ctx.arc(x, y, size/2, 0, Math.PI*2);
            }
            ctx.fill();
            
            ctx.lineWidth = 5;
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.stroke();
        }

        function updateAndDraw() {
            if (!gameState.active) return;

            const width = window.innerWidth;
            const height = window.innerHeight;

            ctx.clearRect(0, 0, width, height);

            gameState.spawnTimer += 16;
            if (gameState.spawnTimer > gameState.spawnRate) {
                gameState.spawnTimer = 0;
                
                if (Math.random() < 0.03 && gameState.lives < 3) {
                    createFigure(false, true);
                } else {
                    let hasCorrect = false;
                    if (gameState.currentChallenge.type === 'normal') {
                        hasCorrect = gameState.figures.some(f => f.isCorrect);
                    } else if (gameState.currentChallenge.type === 'decompose') {
                        hasCorrect = gameState.figures.length > 2;
                    }

                    if (!hasCorrect || Math.random() < 0.3) {
                        createFigure(true);
                    } else {
                        createFigure(false);
                    }
                }
            }

            for (let i = gameState.figures.length - 1; i >= 0; i--) {
                let fig = gameState.figures[i];
                fig.y += fig.speed;
                fig.rotation += fig.rotSpeed;

                ctx.save();
                ctx.translate(fig.x, fig.y);
                ctx.rotate(fig.rotation);
                
                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 8;

                ctx.fillStyle = fig.color;
                
                if (fig.isLife) {
                    ctx.shadowColor = 'rgba(255, 77, 79, 0.9)';
                    ctx.shadowBlur = 25;
                }
                if (gameState.selectedNumber === fig) {
                    ctx.shadowColor = 'rgba(255, 255, 255, 1)';
                    ctx.shadowBlur = 20;
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = '#3B82F6';
                }

                drawShape(ctx, fig.type, 0, 0, fig.size);
                
                ctx.shadowColor = 'transparent';
                ctx.fillStyle = fig.isLife ? '#ffffff' : 'rgba(0,0,0,0.8)';
                
                // MEJORA 1: Texto más grande, grueso y visible
                let fontSize = fig.isLife ? fig.size * 0.28 : fig.size * 0.45;
                ctx.font = `900 ${fontSize}px Fredoka, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(fig.value, 0, 0);
                
                ctx.restore();

                if (fig.y - fig.size > height) {
                    if (fig.isCorrect && gameState.currentChallenge.type === 'normal') {
                        loseLife();
                        generateChallenge();
                    }
                    gameState.figures.splice(i, 1);
                }
            }

            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                let p = gameState.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                
                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            gameLoopId = requestAnimationFrame(updateAndDraw);
        }

        /** * MEJORA 2: Sistema de Detección de Entrada Unificado (Mouse + Táctil)
         * Se utiliza 'pointerdown' que funciona perfectamente y rápido en ambas plataformas.
         */
        function handleInput(x, y) {
            if (!gameState.active) return;
            AudioEngine.init();

            for (let i = gameState.figures.length - 1; i >= 0; i--) {
                let fig = gameState.figures[i];
                let dist = Math.hypot(fig.x - x, fig.y - y);
                
                // MEJORA 2: Margen de clic mucho más grande (+30px extras de Hitbox)
                // Esto facilita enormemente hacer clic mientras se mueven.
                if (dist < (fig.size / 2) + 35) { 
                    
                    if (fig.isLife) {
                        gainLife();
                        spawnParticles(fig.x, fig.y, '#ff4d4f');
                        gameState.figures.splice(i, 1);
                        return;
                    }

                    if (gameState.currentChallenge.type === 'normal') {
                        if (fig.isCorrect) {
                            handleCorrectAnswer(fig);
                        } else {
                            handleWrongAnswer(fig);
                        }
                    } else if (gameState.currentChallenge.type === 'decompose') {
                        handleDecomposeLogic(fig);
                    }
                    
                    return; 
                }
            }
        }

        // Evento Pointer unificado: reemplaza mousedown y touchstart y evita solapamientos.
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault(); // Evita emulación doble en móviles
            handleInput(e.clientX, e.clientY);
        }, { passive: false });
        // Evitar el menú contextual en pulsaciones largas móviles
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        function handleCorrectAnswer(fig) {
            AudioEngine.playCorrect();
            spawnParticles(fig.x, fig.y, fig.color);
            gameState.figures = gameState.figures.filter(f => f.id !== fig.id);
            
            gameState.score += 10 * gameState.level;
            gameState.challengesCompleted++;
            
            updateHUD();
            checkLevelUp();
            generateChallenge();
        }

        function handleWrongAnswer(fig) {
            AudioEngine.playWrong();
            spawnParticles(fig.x, fig.y, '#ff0000');
            gameState.figures = gameState.figures.filter(f => f.id !== fig.id);
            loseLife();
        }

        function handleDecomposeLogic(fig) {
            const subText = document.getElementById('challenge-subtext');
            
            if (!gameState.selectedNumber) {
                gameState.selectedNumber = fig;
                AudioEngine.playTone(600, 'sine', 0.1, 0.1);
                subText.innerText = `Seleccionado: ${fig.value} + ? = ${gameState.currentChallenge.answer}`;
                subText.className = "text-base md:text-lg text-emerald-600 font-bold mt-1";
            } else {
                if (gameState.selectedNumber.id === fig.id) return;

                const sum = gameState.selectedNumber.value + fig.value;
                if (sum === gameState.currentChallenge.answer) {
                    AudioEngine.playCorrect();
                    spawnParticles(gameState.selectedNumber.x, gameState.selectedNumber.y, gameState.selectedNumber.color);
                    spawnParticles(fig.x, fig.y, fig.color);
                    
                    gameState.figures = gameState.figures.filter(f => f.id !== fig.id && f.id !== gameState.selectedNumber.id);
                    gameState.score += 20 * gameState.level;
                    gameState.challengesCompleted++;
                    
                    updateHUD();
                    checkLevelUp();
                    generateChallenge();
                } else {
                    handleWrongAnswer(fig);
                    gameState.selectedNumber = null;
                    subText.innerText = "Toca el primer número";
                    subText.className = "text-base md:text-lg text-blue-600 font-bold mt-1";
                }
            }
        }

        function loseLife() {
            gameState.lives--;
            updateHUD();
            
            document.body.classList.add('screen-shake');
            setTimeout(() => document.body.classList.remove('screen-shake'), 300);

            if (gameState.lives <= 0) {
                gameOver();
            } else {
                AudioEngine.playWrong();
            }
        }

        function gainLife() {
            if (gameState.lives < 3) {
                gameState.lives++;
                updateHUD();
                AudioEngine.playExtraLife();
            } else {
                gameState.score += 50;
                updateHUD();
                AudioEngine.playCorrect();
            }
        }

        function checkLevelUp() {
            if (gameState.challengesCompleted >= 3) {
                gameState.challengesCompleted = 0;
                gameState.level++;
                
                gameState.baseSpeed += 0.35;
                gameState.spawnRate = Math.max(500, gameState.spawnRate - 150);
                
                const lvlDisp = document.getElementById('level-display');
                lvlDisp.classList.add('bounce');
                setTimeout(() => lvlDisp.classList.remove('bounce'), 400);
            }
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = gameState.score;
            document.getElementById('level-display').innerText = gameState.level;
            
            const livesDiv = document.getElementById('lives-display');
            livesDiv.innerHTML = '';
            for(let i=0; i<2; i++) {
                if(i < gameState.lives) {
                    livesDiv.innerHTML += `<span class="heart bounce">❤️</span>`;
                } else {
                    livesDiv.innerHTML += `<span class="heart lost">🖤</span>`;
                }
            }
        }

        /** * MEJORA 3 y 4: Menú Checkboxes Dinámico 
         */
        function startSelectedGame() {
            const checkboxes = document.querySelectorAll('.mode-checkbox:checked');
            const selectedModes = Array.from(checkboxes).map(cb => cb.value);
            
            if (selectedModes.length === 0) {
                document.getElementById('menu-warning').classList.remove('hidden');
                return;
            }
            document.getElementById('menu-warning').classList.add('hidden');
            
            startGame(selectedModes);
        }

        function startGame(modesArray) {
            AudioEngine.init();
            
            gameState = {
                modes: modesArray,
                lives: 2,
                score: 0,
                level: 1,
                challengesCompleted: 0,
                active: true,
                currentChallenge: null,
                figures: [],
                particles: [],
                spawnTimer: 0,
                spawnRate: 2000,
                baseSpeed: 1,
                selectedNumber: null
            };

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('game-ui').classList.add('flex');

            updateHUD();
            generateChallenge();
            
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            updateAndDraw();
        }

        function gameOver() {
            gameState.active = false;
            AudioEngine.playGameOver();
            
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('flex');
            
            const goScreen = document.getElementById('game-over-screen');
            goScreen.classList.remove('hidden');
            goScreen.classList.add('flex');
            
            document.getElementById('final-score').innerText = gameState.score;
        }

        function restartMode() {
            startGame(gameState.modes); // Reinicia con los modos seleccionados previamente
        }

        function goMenu() {
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.remove('flex');
            
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('menu-screen').classList.add('flex');
        }

    </script>
</body>
</html>
