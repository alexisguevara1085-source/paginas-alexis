<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrigonoQuest - Maestro de Triángulos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colores Pedagógicos */
            --color-a-border: #ef4444; /* Rojo */
            --color-a-fill: rgba(239, 68, 68, 0.2);
            --color-b-border: #3b82f6; /* Azul */
            --color-b-fill: rgba(59, 130, 246, 0.2);
            --color-c-border: #10b981; /* Verde */
            --color-c-fill: rgba(16, 185, 129, 0.2);
            
            --color-adv-border: #1f2937;
            --color-adv-fill: rgba(249, 115, 22, 0.2);
            --color-adv-arc: #f97316;
            
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #cbd5e1; /* Fondo oscuro exterior */
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evitar scroll nativo */
            touch-action: none; /* Prevenir gestos del navegador */
        }

        /* Contenedor simulando pantalla móvil */
        #app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px; /* Tamaño máximo en desktop */
            margin: 0 auto;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Pantallas */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
            background: var(--bg-color);
            z-index: 10;
        }

        .screen.active {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .screen.previous {
            transform: translateX(-100%);
        }

        /* Top Panel */
        #top-panel {
            background: white;
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        /* Canvas interactivo */
        .game-canvas {
            width: 100%;
            flex-grow: 1;
            touch-action: none; /* Importante para canvas interactivo */
        }

        /* Animaciones */
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,255,255,1)); }
            100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .shake-animation {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* UI Elements */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-law {
            background: white;
            border: 2px solid #e2e8f0;
            color: #475569;
            font-weight: bold;
            border-radius: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .btn-law:active {
            transform: scale(0.95);
            border-color: #cbd5e1;
        }

        /* Progreso */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #34d399, #10b981);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        /* Drag and Drop (World 3) */
        .draggable-piece {
            position: absolute;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
            touch-action: none;
            z-index: 100;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .draggable-piece.dragging {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-color: #6366f1;
            z-index: 101;
        }
        .drop-zone {
            width: 55px;
            height: 40px;
            border: 2px dashed #94a3b8;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(241, 245, 249, 0.5);
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .drop-zone.hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
            transform: scale(1.05);
        }
        .drop-zone.filled {
            border-style: solid;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        /* Feedback Flotante */
        #feedback-toast {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200;
            width: 90%;
        }
        #feedback-toast.show {
            bottom: 20px;
        }

        /* Partículas */
        .particle {
            position: absolute;
            pointer-events: none;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 150;
        }
        
        /* Ocultar elementos si modo avanzado */
        .advanced-mode-active .color-indicator {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="app-container">

<script>
/**
 * ESTADO Y LÓGICA PRINCIPAL
 */
const state = {
    screen: 'menu',
    xp: 0,
    correct: 0,
    incorrect: 0,
    streak: 0,
    advancedMode: false,
    triangle: null,
    w2_scenario: null,
    w1_selection: null,
    w3_triangle: null,
    w3_equation: null,
    w3_pieces: [],
    draggingPiece: null
};

// Constantes Visuales
const COLORS = {
    a: { border: '#ef4444', fill: 'rgba(239, 68, 68, 0.3)', light: '#fca5a5' },
    b: { border: '#3b82f6', fill: 'rgba(59, 130, 246, 0.3)', light: '#93c5fd' },
    c: { border: '#10b981', fill: 'rgba(16, 185, 129, 0.3)', light: '#6ee7b7' },
    adv: { border: '#1f2937', fill: 'rgba(249, 115, 22, 0.3)', arc: '#f97316' },
    neutral: '#94a3b8',
    highlight: '#fbbf24'
};

// Elementos UI
const screens = {
    menu: document.getElementById('screen-menu'),
    w1: document.getElementById('screen-w1'),
    w2: document.getElementById('screen-w2'),
    w3: document.getElementById('screen-w3')
};
const ctxW1 = document.getElementById('canvas-w1').getContext('2d');
const ctxW2 = document.getElementById('canvas-w2').getContext('2d');
const ctxW3mini = document.getElementById('canvas-w3-mini').getContext('2d');

/**
 * UTILIDADES MATEMÁTICAS Y GEOMÉTRICAS
 */
function randomRange(min, max) { return Math.random() * (max - min) + min; }

// Distancia punto a segmento
function distToSegment(p, v, w) {
    let l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
    if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

// Ángulo entre 3 puntos (B es el vértice)
function angleBetween(A, B, C) {
    let a = Math.pow(C.x - B.x, 2) + Math.pow(C.y - B.y, 2);
    let b = Math.pow(C.x - A.x, 2) + Math.pow(C.y - A.y, 2);
    let c = Math.pow(A.x - B.x, 2) + Math.pow(A.y - B.y, 2);
    return Math.acos((a + c - b) / (2 * Math.sqrt(a) * Math.sqrt(c)));
}

function generateRandomTriangle(width, height) {
    let padding = 60;
    let A, B, C, area;
    
    // Generar hasta que el área sea decente (no muy aplastado)
    do {
        A = { x: randomRange(padding, width - padding), y: randomRange(padding, height/2) };
        B = { x: randomRange(padding, width/2), y: randomRange(height/2, height - padding) };
        C = { x: randomRange(width/2, width - padding), y: randomRange(height/2, height - padding) };
        
        area = Math.abs((A.x*(B.y-C.y) + B.x*(C.y-A.y) + C.x*(A.y-B.y))/2);
    } while (area < (width * height * 0.05) || area > (width * height * 0.3));

    // Calcular lados y ángulos
    const aLen = Math.hypot(B.x - C.x, B.y - C.y);
    const bLen = Math.hypot(A.x - C.x, A.y - C.y);
    const cLen = Math.hypot(A.x - B.x, A.y - B.y);
    
    const angA = angleBetween(B, A, C);
    const angB = angleBetween(A, B, C);
    const angC = angleBetween(A, C, B);

    return {
        pts: { A, B, C },
        sidesLen: { a: aLen, b: bLen, c: cLen },
        anglesVal: { A: angA, B: angB, C: angC },
        center: { x: (A.x+B.x+C.x)/3, y: (A.y+B.y+C.y)/3 }
    };
}

/**
 * MOTOR DE RENDERIZADO CANVAS
 */
function resizeCanvas(canvas) {
    const parent = canvas.parentElement;
    canvas.width = parent.clientWidth;
    canvas.height = parent.clientHeight;
}

function drawTriangle(ctx, tri, highlightInfo = null, showAll = true, specificKnowns = null) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    if (!tri) return;

    const { A, B, C } = tri.pts;
    const isAdv = state.advancedMode;

    // --- DIBUJAR ÁNGULOS (Arcos siempre interiores) ---
    const drawAngle = (vertex, p1, p2, name, colorConfig) => {
        const radius = isAdv ? 25 : 30;
        
        let startAngle = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
        let endAngle = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
        
        // Normalizar a 0-2PI
        if (startAngle < 0) startAngle += 2 * Math.PI;
        if (endAngle < 0) endAngle += 2 * Math.PI;
        
        let diff = endAngle - startAngle;
        if (diff < 0) diff += 2 * Math.PI;
        
        // Determina la dirección correcta para pintar siempre la parte interior del ángulo (< 180 deg)
        const anticlockwise = diff > Math.PI;
        
        let isHighlighted = false;
        let isKnown = false;
        
        if (highlightInfo) {
            isHighlighted = (highlightInfo.type === 'angle' && highlightInfo.name === name) || 
                            (highlightInfo.type === 'side' && highlightInfo.name.toLowerCase() === name.toLowerCase());
        }
        if (specificKnowns) {
            isKnown = specificKnowns.angles.includes(name);
        }

        if (!showAll && !isKnown && !isHighlighted) return;

        ctx.beginPath();
        ctx.moveTo(vertex.x, vertex.y);
        ctx.arc(vertex.x, vertex.y, isHighlighted ? radius + 10 : radius, startAngle, endAngle, anticlockwise);
        ctx.closePath();

        if (isAdv) {
            ctx.fillStyle = isKnown || isHighlighted ? COLORS.adv.fill : 'transparent';
            ctx.fill();
            if (isKnown || isHighlighted) {
                ctx.beginPath();
                ctx.arc(vertex.x, vertex.y, radius, startAngle, endAngle, anticlockwise);
                ctx.strokeStyle = COLORS.adv.arc;
                ctx.lineWidth = isHighlighted ? 4 : 2;
                ctx.stroke();
            }
        } else {
            ctx.fillStyle = isHighlighted ? colorConfig.border : colorConfig.fill;
            ctx.fill();
        }

        // Texto del ángulo (posicionamiento robusto en el interior usando bisectores)
        if (showAll || isKnown) {
            const v1x = p1.x - vertex.x, v1y = p1.y - vertex.y;
            const l1 = Math.hypot(v1x, v1y);
            const nv1x = v1x / l1, nv1y = v1y / l1;

            const v2x = p2.x - vertex.x, v2y = p2.y - vertex.y;
            const l2 = Math.hypot(v2x, v2y);
            const nv2x = v2x / l2, nv2y = v2y / l2;
            
            const bx = nv1x + nv2x;
            const by = nv1y + nv2y;
            const bl = Math.hypot(bx, by);
            
            const lx = vertex.x + (bx / bl) * (radius + 15);
            const ly = vertex.y + (by / bl) * (radius + 15);
            
            ctx.fillStyle = isAdv ? COLORS.adv.border : colorConfig.border;
            ctx.font = isHighlighted ? "bold 20px Nunito" : "bold 16px Nunito";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (specificKnowns && isKnown && !isAdv) {
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath(); ctx.arc(lx, ly, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = colorConfig.border;
            }
            ctx.fillText(name, lx, ly);
        }
    };

    drawAngle(A, B, C, 'A', COLORS.a);
    drawAngle(B, C, A, 'B', COLORS.b);
    drawAngle(C, A, B, 'C', COLORS.c);

    // --- DIBUJAR LADOS ---
    const drawSide = (p1, p2, name, colorConfig) => {
        let isHighlighted = false;
        let isKnown = false;

        if (highlightInfo) {
            isHighlighted = (highlightInfo.type === 'side' && highlightInfo.name === name) ||
                            (highlightInfo.type === 'angle' && highlightInfo.name.toLowerCase() === name);
        }
        if (specificKnowns) {
            isKnown = specificKnowns.sides.includes(name);
        }

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        
        if (isAdv) {
            ctx.strokeStyle = COLORS.adv.border;
            ctx.lineWidth = isHighlighted ? 6 : (showAll || isKnown ? 3 : 1);
            if (!showAll && !isKnown && !isHighlighted) {
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#cbd5e1';
            } else {
                ctx.setLineDash([]);
            }
        } else {
            ctx.setLineDash([]);
            if (!showAll && !isKnown && !isHighlighted) {
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 2;
            } else {
                ctx.strokeStyle = colorConfig.border;
                ctx.lineWidth = isHighlighted ? 8 : 4;
            }
            
            if (isHighlighted) {
                ctx.shadowColor = colorConfig.border;
                ctx.shadowBlur = 10;
            } else {
                ctx.shadowBlur = 0;
            }
        }
        
        ctx.stroke();
        ctx.shadowBlur = 0; 
        ctx.setLineDash([]);

        if (showAll || isKnown || isHighlighted) {
            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;
            const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            const ox = mx + Math.cos(angle + Math.PI/2) * 20;
            const oy = my + Math.sin(angle + Math.PI/2) * 20;

            ctx.fillStyle = isAdv ? COLORS.adv.border : colorConfig.border;
            ctx.font = isHighlighted ? "italic bold 22px Nunito" : "italic bold 18px Nunito";
            
            if (specificKnowns && isKnown && !isAdv) {
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath(); ctx.arc(ox, oy, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = colorConfig.border;
            }
            
            ctx.fillText(name, ox, oy);
        }
    };

    drawSide(B, C, 'a', COLORS.a);
    drawSide(A, C, 'b', COLORS.b);
    drawSide(A, B, 'c', COLORS.c);
    
    // --- DIBUJAR VÉRTICES ---
    ctx.fillStyle = isAdv ? '#1f2937' : '#334155';
    [A, B, C].forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    });
}

/**
 * LÓGICA MUNDO 1: EXPLORADOR
 */
function generateW1Triangle() {
    const canvas = document.getElementById('canvas-w1');
    resizeCanvas(canvas);
    state.triangle = generateRandomTriangle(canvas.width, canvas.height);
    state.w1_selection = null;
    hideW1Info();
    drawTriangle(ctxW1, state.triangle);
}

function handleW1Click(e) {
    if (state.screen !== 'w1' || !state.triangle) return;
    
    const rect = e.target.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    
    const { A, B, C } = state.triangle.pts;
    const thresholdAngle = 40;
    const thresholdSide = 25;

    // Detectar Ángulos (prioridad)
    if (Math.hypot(x - A.x, y - A.y) < thresholdAngle) return selectW1('angle', 'A');
    if (Math.hypot(x - B.x, y - B.y) < thresholdAngle) return selectW1('angle', 'B');
    if (Math.hypot(x - C.x, y - C.y) < thresholdAngle) return selectW1('angle', 'C');

    // Detectar Lados
    if (distToSegment({x,y}, B, C) < thresholdSide) return selectW1('side', 'a');
    if (distToSegment({x,y}, A, C) < thresholdSide) return selectW1('side', 'b');
    if (distToSegment({x,y}, A, B) < thresholdSide) return selectW1('side', 'c');

    state.w1_selection = null;
    hideW1Info();
    drawTriangle(ctxW1, state.triangle);
}

function selectW1(type, name) {
    state.w1_selection = { type, name };
    drawTriangle(ctxW1, state.triangle, state.w1_selection);
    
    const card = document.getElementById('w1-info-card');
    const p1 = document.getElementById('w1-info-part1');
    const p2 = document.getElementById('w1-info-part2');
    
    const oppName = type === 'side' ? name.toUpperCase() : name.toLowerCase();
    const baseColorClass = getTailwindColorClass(name);
    
    p1.className = `px-3 py-1 rounded-lg font-black text-white ${baseColorClass.bg}`;
    p1.innerText = type === 'side' ? `Lado ${name}` : `Ángulo ${name}`;
    
    p2.className = `px-3 py-1 rounded-lg font-black text-white ${baseColorClass.bg}`;
    p2.innerText = type === 'side' ? `Ángulo ${oppName}` : `Lado ${oppName}`;
    
    card.classList.remove('opacity-0');
    if (navigator.vibrate) navigator.vibrate(50);
}

function hideW1Info() {
    document.getElementById('w1-info-card').classList.add('opacity-0');
}

function getTailwindColorClass(name) {
    if (state.advancedMode) return { bg: 'bg-slate-800' };
    const n = name.toLowerCase();
    if (n === 'a') return { bg: 'bg-red-500' };
    if (n === 'b') return { bg: 'bg-blue-500' };
    if (n === 'c') return { bg: 'bg-green-500' };
    return { bg: 'bg-slate-500' };
}

/**
 * LÓGICA MUNDO 2: DETECTIVE
 */
function generateW2Scenario() {
    const canvas = document.getElementById('canvas-w2');
    resizeCanvas(canvas);
    state.triangle = generateRandomTriangle(canvas.width, canvas.height);
    
    const scenarios = [
        { type: 'seno', name: 'LAA', logic: () => ({ sides: ['a'], angles: ['A', 'B'] }) },
        { type: 'seno', name: 'LLA', logic: () => ({ sides: ['a', 'b'], angles: ['A'] }) },
        { type: 'coseno', name: 'LAL', logic: () => ({ sides: ['b', 'c'], angles: ['A'] }) },
        { type: 'coseno', name: 'LLL', logic: () => ({ sides: ['a', 'b', 'c'], angles: [] }) }
    ];
    
    const sc = scenarios[Math.floor(Math.random() * scenarios.length)];
    state.w2_scenario = sc.type;
    
    const vars = sc.logic();
    const sideNames = ['a', 'b', 'c'].sort(() => 0.5 - Math.random());
    const angleNames = sideNames.map(s => s.toUpperCase());
    
    let mappedKnowns = { sides: [], angles: [] };
    
    if (sc.name === 'LAA') {
        mappedKnowns.sides.push(sideNames[0]);
        mappedKnowns.angles.push(angleNames[0]);
        mappedKnowns.angles.push(angleNames[1]);
    } else if (sc.name === 'LLA') {
        mappedKnowns.sides.push(sideNames[0], sideNames[1]);
        mappedKnowns.angles.push(angleNames[0]);
    } else if (sc.name === 'LAL') {
        mappedKnowns.sides.push(sideNames[0], sideNames[1]);
        mappedKnowns.angles.push(angleNames[2]);
    } else if (sc.name === 'LLL') {
        mappedKnowns.sides = [...sideNames];
    }
    
    state.triangle.knowns = mappedKnowns;
    drawW2();
}

function drawW2(highlightInfo = null) {
    drawTriangle(ctxW2, state.triangle, highlightInfo, false, state.triangle.knowns);
}

function checkW2Answer(answer) {
    const isCorrect = answer === state.w2_scenario;
    const card = document.getElementById('screen-w2').querySelector('.bg-white');
    
    if (isCorrect) {
        addXP(10);
        showFeedback(true, "¡Excelente vista!", "Identificaste la relación correctamente.");
        createParticles(document.body.clientWidth/2, document.body.clientHeight/2);
        setTimeout(generateW2Scenario, 1500);
    } else {
        resetStreak();
        card.classList.add('shake-animation');
        setTimeout(() => card.classList.remove('shake-animation'), 400);
        
        let msg = "";
        let highlight = null;
        
        if (state.w2_scenario === 'seno') {
            msg = "Busca parejas. Tienes un lado conocido y su ángulo opuesto. Eso es dominio del SENO.";
            const oppSide = state.triangle.knowns.sides.find(s => state.triangle.knowns.angles.includes(s.toUpperCase()));
            if (oppSide) highlight = { type: 'side', name: oppSide };
        } else {
            if (state.triangle.knowns.sides.length === 3) {
                msg = "Tienes 3 lados y ningún ángulo. Imposible armar la pareja del Seno. Usa COSENO.";
            } else {
                msg = "El ángulo conocido está ATRAPADO entre dos lados conocidos (LAL). ¡Usa COSENO!";
            }
        }
        
        showFeedback(false, "Miremos mejor...", msg);
        drawW2(highlight);
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }
}

function showW2Hint() {
    let msg = state.w2_scenario === 'seno' 
        ? "¿Ves una pareja de un lado y su ángulo opuesto?" 
        : "¿Está el ángulo atrapado (LAL) o tienes todos los lados (LLL)?";
    showFeedback('info', "Pista del Detective", msg);
}

/**
 * LÓGICA MUNDO 3: CONSTRUCTOR
 */

        container.appendChild(equals);
        container.appendChild(createFrac('w3-drop-tr', 'w3-drop-br', 'c', null));

            { id: 'p1', val: 'b', type: 'side', target: 'w3-drop-tl' },
            { id: 'p2', val: 'sen(C)', type: 'angle', target: 'w3-drop-br' },
            { id: 'p3', val: 'sen(A)', type: 'angle', target: null },

            { id: 'p2', val: 'sen(A)', type: 'angle', target: 'w3-drop-br' },

function renderW3Pieces() {
    const container = document.getElementById('w3-pieces-container');
    container.innerHTML = '<span class="absolute top-1 left-3 text-[10px] font-bold text-slate-400">PIEZAS DISPONIBLES</span>';
    
    state.w3_pieces.forEach((p, index) => {
        const el = document.createElement('div');
        el.className = 'draggable-piece';
        el.innerText = p.val;
        el.dataset.id = p.id;
        el.dataset.type = p.type;
        el.dataset.val = p.val;
        
        // Posicionamiento calculado para centrar dinámicamente y aprovechar espacio
        const col = index % 2;
        const row = Math.floor(index / 2);
        el.style.left = `calc(50% - 80px + ${col * 100}px)`;
        el.style.top = `${22 + row * 40}px`;

        el.addEventListener('touchstart', handleDragStart, {passive: false});
        el.addEventListener('touchmove', handleDragMove, {passive: false});
        el.addEventListener('touchend', handleDragEnd);
        
        el.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);

        container.appendChild(el);
    });
}

// Custom Drag and Drop Engine
let dragEl = null;
let dragStartX = 0, dragStartY = 0;
let initialLeft = 0, initialTop = 0;

function handleDragStart(e) {
    if(e.type === 'mousedown' && e.button !== 0) return;
    if(state.screen !== 'w3') return;
    
    dragEl = e.target.closest('.draggable-piece');
    if (!dragEl) return;
    
    if(e.type.startsWith('touch')) e.preventDefault();

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    dragStartX = clientX;
    dragStartY = clientY;
    
    const style = window.getComputedStyle(dragEl);
    const matrix = new WebKitCSSMatrix(style.transform);
    initialLeft = matrix.m41;
    initialTop = matrix.m42;

    dragEl.classList.add('dragging');
    
    if (dragEl.parentElement.classList.contains('drop-zone')) {
        const dropZone = dragEl.parentElement;
        dropZone.classList.remove('filled');
        document.getElementById('w3-pieces-container').appendChild(dragEl);
        
        const rect = dropZone.getBoundingClientRect();
        const containerRect = document.getElementById('w3-pieces-container').getBoundingClientRect();
        dragEl.style.transform = `translate(${rect.left - containerRect.left}px, ${rect.top - containerRect.top}px)`;
        initialLeft = rect.left - containerRect.left;
        initialTop = rect.top - containerRect.top;
    }
}

function handleDragMove(e) {
    if (!dragEl || state.screen !== 'w3') return;
    if(e.type.startsWith('touch')) e.preventDefault();

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    const dx = clientX - dragStartX;
    const dy = clientY - dragStartY;

    dragEl.style.transform = `translate(${initialLeft + dx}px, ${initialTop + dy}px)`;

    const pieceRect = dragEl.getBoundingClientRect();
    const pieceCenter = { x: pieceRect.left + pieceRect.width/2, y: pieceRect.top + pieceRect.height/2 };
    
    document.querySelectorAll('.drop-zone:not(.filled)').forEach(dz => {
        const dzRect = dz.getBoundingClientRect();
        if (pieceCenter.x > dzRect.left && pieceCenter.x < dzRect.right && 
            pieceCenter.y > dzRect.top && pieceCenter.y < dzRect.bottom) {
            dz.classList.add('hover');
        } else {
            dz.classList.remove('hover');
        }
    });
}

function handleDragEnd(e) {
    if (!dragEl || state.screen !== 'w3') return;
    
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

    dragEl.classList.remove('dragging');
    
    let dropped = false;
    
    const dropZones = document.querySelectorAll('.drop-zone:not(.filled)');
    for (let dz of dropZones) {
        dz.classList.remove('hover');
        const dzRect = dz.getBoundingClientRect();
        if (clientX > dzRect.left && clientX < dzRect.right && 
            clientY > dzRect.top && clientY < dzRect.bottom) {
            
            if (dz.dataset.accepts && dz.dataset.accepts !== dragEl.dataset.type) {
                showFeedback(false, "Mmm, no encaja", "Un lado no puede ir donde va un ángulo (y viceversa).");
                break;
            }

            dz.appendChild(dragEl);
            dragEl.style.transform = 'translate(0,0)';
            dragEl.style.left = 'auto';
            dragEl.style.top = 'auto';
            dragEl.style.position = 'relative';
            dz.classList.add('filled');
            dropped = true;
            
            checkW3Completion();
            break;
        }
    }

    if (!dropped) {
        dragEl.style.transform = 'translate(0,0)';
        dragEl.style.position = 'absolute';
    }

    dragEl = null;
}

function checkW3Completion() {
    const emptyZones = document.querySelectorAll('.drop-zone:not(.filled)');
    if (emptyZones.length > 0) return;

    let isCorrect = true;
    
    if (state.w3_special_logic === 'pair') {
        const topEl = document.getElementById('w3-drop-tr').querySelector('.draggable-piece');
        const botEl = document.getElementById('w3-drop-br').querySelector('.draggable-piece');
        
        if (topEl && botEl) {
            const vTop = topEl.dataset.val; 
            const vBot = botEl.dataset.val; 
            
            if ((vTop === 'a' && vBot === 'sen(A)') || (vTop === 'b' && vBot === 'sen(B)')) {
                isCorrect = true;
            } else {
                isCorrect = false;
            }
        } else { isCorrect = false; }
    } else {
        state.w3_pieces.forEach(p => {
            if (p.target) {
                const dz = document.getElementById(p.target);
                if (dz) {
                    const pieceInDz = dz.querySelector('.draggable-piece');
                    if (!pieceInDz || pieceInDz.dataset.id !== p.id) {
                        isCorrect = false;
                    }
                }
            }
        });
    }

    if (isCorrect) {
        addXP(15);
        showFeedback(true, "¡Fórmula Perfecta!", "Entiendes perfectamente la estructura.");
        createParticles(document.body.clientWidth/2, document.body.clientHeight/2);
        setTimeout(initW3, 2000);
    } else {
        resetStreak();
        showFeedback(false, "Algo no cuadra", "Recuerda: lado / seno(ángulo opuesto)");
        document.getElementById('w3-equation-container').classList.add('shake-animation');
        setTimeout(() => {
            document.getElementById('w3-equation-container').classList.remove('shake-animation');
            initW3(); 
        }, 1500);
    }
}

/**
 * SISTEMA DE NAVEGACIÓN Y GAMIFICACIÓN
 */
function switchScreen(screenId) {
    Object.values(screens).forEach(s => {
        s.classList.remove('active', 'previous');
        if (s.id !== screenId && s.id !== 'screen-menu') {
            s.classList.add('previous');
        }
    });
    const target = document.getElementById(screenId);
    target.classList.remove('previous');
    target.classList.add('active');
    state.screen = screenId.replace('screen-', '');
}

function startWorld(w) {
    if (w === 3 && state.xp < 50) {
        showFeedback('info', "Bloqueado", "Necesitas 50 XP para entrar al Constructor.");
        return;
    }
    
    switchScreen(`screen-w${w}`);
    
    if (w === 1) {
        setTimeout(generateW1Triangle, 100);
        document.getElementById('canvas-w1').addEventListener('touchstart', handleW1Click, {passive: true});
        document.getElementById('canvas-w1').addEventListener('mousedown', handleW1Click);
    } else if (w === 2) {
        setTimeout(generateW2Scenario, 100);
    } else if (w === 3) {
        setTimeout(initW3, 100);
    }
}

function goHome() {
    switchScreen('screen-menu');
    updateMenuUI();
}

function updateMenuUI() {
    if (state.xp >= 50) {
        document.getElementById('lock-w3').style.display = 'none';
    }
    if (state.xp >= 100) {
        document.getElementById('btn-toggle-adv').classList.remove('hidden');
    }
}

function addXP(amount) {
    state.xp += amount;
    state.correct++;
    state.streak++;
    
    const xpBonus = Math.floor(state.streak / 3) * 5;
    state.xp += xpBonus;

    document.getElementById('stat-xp').innerText = state.xp;
    document.getElementById('stat-correct').innerText = state.correct;
    document.getElementById('stat-streak').innerText = state.streak;
    
    const pct = Math.min(100, (state.xp / 200) * 100);
    document.getElementById('xp-bar').style.width = `${pct}%`;
    
    document.getElementById('stat-xp').parentElement.classList.add('pop-in');
    setTimeout(() => document.getElementById('stat-xp').parentElement.classList.remove('pop-in'), 300);

    updateMenuUI();
}

function resetStreak() {
    state.incorrect++;
    state.streak = 0;
    document.getElementById('stat-incorrect').innerText = state.incorrect;
    document.getElementById('stat-streak').innerText = state.streak;
}

function showFeedback(type, title, msg) {
    const toast = document.getElementById('feedback-toast');
    const icon = document.getElementById('feedback-icon');
    
    document.getElementById('feedback-title').innerText = title;
    document.getElementById('feedback-msg').innerText = msg;
    
    if (type === true) {
        icon.innerHTML = '<i class="fa-solid fa-check"></i>';
        icon.className = "w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xl bg-green-500 shadow-lg shadow-green-500/50";
    } else if (type === false) {
        icon.innerHTML = '<i class="fa-solid fa-xmark"></i>';
        icon.className = "w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xl bg-red-500 shadow-lg shadow-red-500/50";
    } else {
        icon.innerHTML = '<i class="fa-solid fa-info"></i>';
        icon.className = "w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xl bg-blue-500 shadow-lg shadow-blue-500/50";
    }
    
    toast.classList.add('show');
    
    clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(() => {
        toast.classList.remove('show');
    }, 4000);
}

function toggleAdvancedMode() {
    state.advancedMode = !state.advancedMode;
    const icon = document.getElementById('icon-adv-toggle');
    const badge = document.getElementById('mode-badge');
    
    // Forzamos el renderizado del triángulo actual en la pantalla que esté para que se aplique el estilo en tiempo real
    if (state.advancedMode) {
        icon.classList.replace('fa-toggle-off', 'fa-toggle-on');
        icon.classList.replace('text-slate-400', 'text-indigo-500');
        badge.classList.remove('hidden');
        document.body.classList.add('advanced-mode-active');
        showFeedback('info', "Modo PRO Activado", "Los colores de ayuda se han ocultado. Confía en tu geometría visual.");
    } else {
        icon.classList.replace('fa-toggle-on', 'fa-toggle-off');
        icon.classList.replace('text-indigo-500', 'text-slate-400');
        badge.classList.add('hidden');
        document.body.classList.remove('advanced-mode-active');
    }
}

/**
 * EFECTOS VISUALES (Partículas)
 */
function createParticles(x, y) {
    const container = document.getElementById('app-container');
    const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ef4444'];
    
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle rounded-full';
        
        const size = Math.random() * 8 + 4;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        
        container.appendChild(p);
        
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 60 + 20;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity - 30; 
        
        p.animate([
            { transform: 'translate(0,0) scale(1)', opacity: 1 },
            { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
        ], {
            duration: Math.random() * 500 + 500,
            easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
            fill: 'forwards'
        }).onfinish = () => p.remove();
    }
}

// Redibujar triángulos responsivamente
window.addEventListener('resize', () => {
    if(state.screen === 'w1' && state.triangle) {
        resizeCanvas(document.getElementById('canvas-w1'));
        drawTriangle(ctxW1, state.triangle, state.w1_selection);
    }
    if(state.screen === 'w2' && state.triangle) {
        resizeCanvas(document.getElementById('canvas-w2'));
        drawW2();
    }
    if(state.screen === 'w3' && state.w3_triangle) {
        resizeCanvas(document.getElementById('canvas-w3-mini'));
        drawTriangle(ctxW3mini, state.w3_triangle, null, true);
    }
});

// Start
updateMenuUI();

</script>
