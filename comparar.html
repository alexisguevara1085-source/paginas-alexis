<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz de Números</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:20px;
width:1100px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.menu{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.menu button{
padding:10px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#eee;
}

.menu button:hover{
background:#ddd;
}

.seccion{
display:none;
}

.activo{
display:block;
}

/* CUADRO 100 */

.caja100{
width:140px;
height:140px;
display:grid;
grid-template-columns:repeat(10,1fr);
grid-template-rows:repeat(10,1fr);
gap:1px;
border:2px solid black;
margin:auto;
}

.celda{background:#eee;}
.pintado{background:#3498db;}

.numeroGrande{
font-size:45px;
font-weight:bold;
text-align:center;
}

.fila{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
}

/* COMPARAR */

.signoCaja{
width:60px;
height:60px;
border:3px solid black;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
}

.botonesSigno{
display:flex;
justify-content:center;
gap:15px;
margin-top:15px;
}

.btnSigno{
font-size:40px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* ORDENAR */

.lista{
font-size:30px;
text-align:center;
margin-bottom:10px;
}

.casillas{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.casilla{
width:70px;
height:60px;
font-size:30px;
text-align:center;
border:3px solid black;
}

.signoOrden{
font-size:30px;
font-weight:bold;
}

.teclado{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
justify-content:center;
}

.tecla{
background:#eee;
padding:15px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.resultado{
text-align:center;
font-size:20px;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="menu">
<button onclick="mostrar('comparar')">Comparar</button>
<button onclick="mostrar('ordenar')">Ordenar</button>
</div>

<!-- COMPARAR -->

<div id="comparar" class="seccion activo">

<h2 style="text-align:center;">Comparar números</h2>

<div class="fila">

<div>
<div class="numeroGrande" id="numA"></div>
<div class="caja100" id="grafA"></div>
</div>

<div class="signoCaja" id="signoUsuario"></div>

<div>
<div class="numeroGrande" id="numB"></div>
<div class="caja100" id="grafB"></div>
</div>

</div>

<div class="botonesSigno">
<button class="btnSigno" onclick="ponerSigno('>')">></button>
<button class="btnSigno" onclick="ponerSigno('<')"><</button>
<button class="btnSigno" onclick="ponerSigno('=')">=</button>
</div>

<div class="resultado" id="resultadoComparar"></div>

</div>

<!-- ORDENAR -->

<div id="ordenar" class="seccion">

<h2 style="text-align:center;">Ordenar números</h2>

<div style="text-align:center;margin-bottom:10px;">

Cantidad:
<select id="cantidad">
<option>3</option>
<option>4</option>
<option>5</option>
</select>

Orden:
<select id="tipoOrden">
<option value="asc">Menor → Mayor</option>
<option value="desc">Mayor → Menor</option>
</select>

<button onclick="nuevoOrden()">Generar</button>

</div>

<div class="lista" id="listaNumeros"></div>

<div class="casillas" id="casillasOrden"></div>

<div class="teclado">

<div class="tecla" onclick="agregar(1)">1</div>
<div class="tecla" onclick="agregar(2)">2</div>
<div class="tecla" onclick="agregar(3)">3</div>

<div class="tecla" onclick="agregar(4)">4</div>
<div class="tecla" onclick="agregar(5)">5</div>
<div class="tecla" onclick="agregar(6)">6</div>

<div class="tecla" onclick="agregar(7)">7</div>
<div class="tecla" onclick="agregar(8)">8</div>
<div class="tecla" onclick="agregar(9)">9</div>

<div class="tecla" onclick="borrar()">⌫</div>
<div class="tecla" onclick="agregar(0)">0</div>

</div>

<div style="text-align:center;margin-top:10px;">
<button onclick="verificarOrden()">Comprobar</button>
</div>

<div class="resultado" id="resultadoOrden"></div>

</div>

</div>

<script>

/* MENU */

function mostrar(id){

document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activo"))
document.getElementById(id).classList.add("activo")

}

/* CUADRO 100 */

function dibujar100(num,id){

let cont=document.getElementById(id)
cont.innerHTML=""

for(let i=1;i<=100;i++){

let c=document.createElement("div")
c.className="celda"

if(i<=num) c.classList.add("pintado")

cont.appendChild(c)

}

}

/* COMPARAR */

let a,b

function nuevoComparar(){

a=Math.floor(Math.random()*100)
b=Math.floor(Math.random()*100)

document.getElementById("numA").textContent=a
document.getElementById("numB").textContent=b

dibujar100(a,"grafA")
dibujar100(b,"grafB")

document.getElementById("signoUsuario").textContent=""
document.getElementById("resultadoComparar").textContent=""

}

function ponerSigno(s){

document.getElementById("signoUsuario").textContent=s

let correcto

if(a>b) correcto=">"
else if(a<b) correcto="<"
else correcto="="

if(s==correcto){

document.getElementById("resultadoComparar").style.color="green"
document.getElementById("resultadoComparar").textContent="✔ Correcto"
setTimeout(nuevoComparar,1200)

}else{

document.getElementById("resultadoComparar").style.color="red"
document.getElementById("resultadoComparar").textContent="✘ Intenta otra vez"

}

}

/* ORDENAR */

let numeros=[]
let activo=null

function nuevoOrden(){

let n=parseInt(document.getElementById("cantidad").value)
let cont=document.getElementById("casillasOrden")

numeros=[]
cont.innerHTML=""

for(let i=0;i<n;i++){

let num=Math.floor(Math.random()*100)
numeros.push(num)

}

document.getElementById("listaNumeros").textContent=numeros.join(" , ")

let orden=document.getElementById("tipoOrden").value

for(let i=0;i<n;i++){

let input=document.createElement("input")
input.className="casilla"
input.onclick=()=>activo=input
cont.appendChild(input)

if(i<n-1){

let signo=document.createElement("div")
signo.className="signoOrden"
signo.textContent=orden=="asc"?"<":">"
cont.appendChild(signo)

}

}

document.getElementById("resultadoOrden").textContent=""

}

function agregar(n){

if(!activo) return
activo.value+=n

}

function borrar(){

if(!activo) return
activo.value=activo.value.slice(0,-1)

}

function verificarOrden(){

let inputs=document.querySelectorAll(".casilla")

let valores=[]
inputs.forEach(i=>valores.push(parseInt(i.value)))

let orden=document.getElementById("tipoOrden").value

let correcto=[...numeros]

if(orden=="asc") correcto.sort((a,b)=>a-b)
else correcto.sort((a,b)=>b-a)

if(JSON.stringify(valores)==JSON.stringify(correcto)){

document.getElementById("resultadoOrden").style.color="green"
document.getElementById("resultadoOrden").textContent="✔ Correcto"

}else{

document.getElementById("resultadoOrden").style.color="red"
document.getElementById("resultadoOrden").textContent="✘ Revisa el orden"

}

}

nuevoComparar()

</script>

</body>
</html>
